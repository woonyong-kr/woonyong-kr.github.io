{% assign comments_provider = site.comments.provider | default: "" %}
{% assign disqus_shortname = site.comments.disqus.shortname | default: "" %}
{% if page.comments != false and comments_provider == "disqus" and disqus_shortname != "" %}
  <section class="comments-section" aria-label="댓글">
    <h2 class="comments-section__title">댓글</h2>
    <div id="disqus_thread"></div>
    <script>
      var disqus_config = function () {
        this.page.url = "{{ page.url | absolute_url }}";
        this.page.identifier = "{{ page.url }}";
        this.page.title = {{ page.title | jsonify }};
      };

      (function () {
        var d = document;
        var s = d.createElement("script");
        s.src = "https://{{ disqus_shortname }}.disqus.com/embed.js";
        s.setAttribute("data-timestamp", +new Date());
        (d.head || d.body).appendChild(s);
      })();
    </script>
    <noscript>JavaScript를 활성화해야 댓글을 볼 수 있습니다.</noscript>
  </section>
{% endif %}
