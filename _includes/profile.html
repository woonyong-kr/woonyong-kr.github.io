{% assign series_count = site.data.series | size %}
<section class="profile">
  <div class="profile__section">
    <div class="profile__left">
      <img
        class="profile__avatar"
        src="{{ site.data.profile.avatar }}"
        alt="{{ site.data.profile.display_name }}"
        width="128"
        height="128"
      >
      <div class="profile__info">
        <h1 class="profile__name">{{ site.data.profile.display_name }}</h1>
        <p class="profile__bio">{{ site.data.profile.bio }}</p>
        <p class="profile__intro">{{ site.data.profile.intro }}</p>
      </div>
    </div>
  </div>

  <div class="profile__separator"></div>

  <div class="profile__bottom">
    <div class="profile__stats">
      <div class="profile__stat">
        <span class="profile__stat-value">{{ site.posts | size }}</span>
        <span class="profile__stat-label">포스트</span>
      </div>
      <div class="profile__stat">
        <span class="profile__stat-value">{{ series_count }}</span>
        <span class="profile__stat-label">시리즈</span>
      </div>
    </div>

    <div class="profile__actions">
      <a class="profile__icon-link" href="{{ site.data.profile.github }}" target="_blank" rel="noreferrer" aria-label="GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.71.08-.71 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.69 1.25 3.35.95.1-.74.4-1.25.72-1.54-2.55-.29-5.23-1.28-5.23-5.69 0-1.26.45-2.29 1.18-3.09-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.14 1.18a10.9 10.9 0 0 1 5.72 0c2.18-1.49 3.14-1.18 3.14-1.18.62 1.58.23 2.75.12 3.04.73.8 1.17 1.83 1.17 3.09 0 4.42-2.69 5.39-5.25 5.67.41.36.78 1.08.78 2.18 0 1.57-.01 2.84-.01 3.23 0 .31.2.67.8.56A11.52 11.52 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"
            fill="currentColor"
          ></path>
        </svg>
      </a>
      <a class="profile__icon-link" href="{{ site.data.profile.website }}" aria-label="홈페이지">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 3.5 3 11v9a1 1 0 0 0 1 1h5.5v-5.5h5V21H20a1 1 0 0 0 1-1v-9l-9-7.5Zm0-2.6 10 8.34a1 1 0 0 1 .36.76V20a3 3 0 0 1-3 3h-6.86v-5.5h-1V23H4.64a3 3 0 0 1-3-3V10a1 1 0 0 1 .36-.76L12 .9Z"
            fill="currentColor"
          ></path>
        </svg>
      </a>
      <a class="profile__cta" href="{{ site.data.profile.cta_url }}" target="_blank" rel="noreferrer">
        {{ site.data.profile.cta_label }}
      </a>
    </div>
  </div>
</section>
