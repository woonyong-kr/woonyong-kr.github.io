<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="{{ '/assets/images/rogo.svg' | relative_url }}" type="image/svg+xml">
<link rel="alternate" type="application/atom+xml" href="{{ '/feed.xml' | relative_url }}" title="{{ site.title }}">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<script>
  (function () {
    try {
      var theme = localStorage.getItem("velog-theme") || "light";
      document.documentElement.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
    } catch (error) {
      document.documentElement.setAttribute("data-theme", "light");
    }
  })();
</script>
