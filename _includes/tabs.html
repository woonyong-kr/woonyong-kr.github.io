{% assign active = include.active | default: 'posts' %}
{% assign tab_index = 0 %}
{% if active == 'series' %}
  {% assign tab_index = 1 %}
{% elsif active == 'about' %}
  {% assign tab_index = 2 %}
{% endif %}
<nav class="velog-tabs" aria-label="콘텐츠 구분">
  <div class="velog-tabs__inner">
    <a class="velog-tabs__item{% if active == 'posts' %} is-active{% endif %}" href="{{ '/' | relative_url }}">글</a>
    <a class="velog-tabs__item{% if active == 'series' %} is-active{% endif %}" href="{{ '/series/' | relative_url }}">시리즈</a>
    <a class="velog-tabs__item{% if active == 'about' %} is-active{% endif %}" href="{{ '/about/' | relative_url }}">소개</a>
    <span class="velog-tabs__indicator" style="--tab-index: {{ tab_index }};"></span>
  </div>
</nav>
