<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title>Writing model guide</title>
  <desc>Front matter to UI mapping for posts.</desc>
  <rect width="1280" height="720" rx="40" fill="#eef7ff"/>
  <rect x="72" y="72" width="1136" height="576" rx="32" fill="#ffffff" stroke="#74c0fc" stroke-width="6"/>
  <text x="110" y="138" fill="#1c1f23" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Post Authoring Model</text>
  <text x="110" y="182" fill="#495057" font-family="Arial, Helvetica, sans-serif" font-size="24">front matter에 넣은 값이 목록, 태그, 시리즈, 상세 화면으로 어떻게 연결되는지 설명하는 다이어그램</text>

  <rect x="112" y="232" width="458" height="330" rx="28" fill="#0f172a"/>
  <text x="146" y="286" fill="#51cf66" font-family="SFMono-Regular, Consolas, monospace" font-size="26">title:</text>
  <text x="294" y="286" fill="#f8f9fa" font-family="SFMono-Regular, Consolas, monospace" font-size="26">목록 제목 / 상세 제목</text>
  <text x="146" y="334" fill="#51cf66" font-family="SFMono-Regular, Consolas, monospace" font-size="26">description:</text>
  <text x="342" y="334" fill="#f8f9fa" font-family="SFMono-Regular, Consolas, monospace" font-size="26">카드 요약</text>
  <text x="146" y="382" fill="#51cf66" font-family="SFMono-Regular, Consolas, monospace" font-size="26">thumbnail:</text>
  <text x="322" y="382" fill="#f8f9fa" font-family="SFMono-Regular, Consolas, monospace" font-size="26">카드 / 상세 상단 이미지</text>
  <text x="146" y="430" fill="#51cf66" font-family="SFMono-Regular, Consolas, monospace" font-size="26">series:</text>
  <text x="276" y="430" fill="#f8f9fa" font-family="SFMono-Regular, Consolas, monospace" font-size="26">시리즈 카드 / 필터</text>
  <text x="146" y="478" fill="#51cf66" font-family="SFMono-Regular, Consolas, monospace" font-size="26">tags:</text>
  <text x="252" y="478" fill="#f8f9fa" font-family="SFMono-Regular, Consolas, monospace" font-size="26">홈 태그 목록 / 상세 링크</text>
  <text x="146" y="526" fill="#51cf66" font-family="SFMono-Regular, Consolas, monospace" font-size="26">updated_at:</text>
  <text x="340" y="526" fill="#f8f9fa" font-family="SFMono-Regular, Consolas, monospace" font-size="26">수정일 / 최신 정렬 기준</text>

  <rect x="668" y="232" width="428" height="330" rx="28" fill="#f8f9fa" stroke="#dee2e6" stroke-width="4"/>
  <rect x="712" y="274" width="146" height="118" rx="18" fill="#74c0fc"/>
  <rect x="884" y="278" width="150" height="26" rx="13" fill="#228be6" opacity="0.18"/>
  <rect x="884" y="330" width="120" height="18" rx="9" fill="#ced4da"/>
  <rect x="884" y="368" width="108" height="18" rx="9" fill="#ced4da"/>
  <rect x="712" y="430" width="104" height="28" rx="14" fill="#e7f5ff"/>
  <rect x="832" y="430" width="104" height="28" rx="14" fill="#e7f5ff"/>
  <rect x="952" y="430" width="104" height="28" rx="14" fill="#e7f5ff"/>
  <text x="712" y="520" fill="#1c1f23" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Card + Post View</text>

  <path d="M570 396h64" stroke="#74c0fc" stroke-width="8" stroke-linecap="round"/>
</svg>
