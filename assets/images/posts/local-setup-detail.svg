<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title>Local setup guide</title>
  <desc>Step by step local setup guide for the theme.</desc>
  <rect width="1280" height="720" rx="40" fill="#ecfdf3"/>
  <rect x="72" y="72" width="1136" height="576" rx="32" fill="#ffffff" stroke="#d3f9d8" stroke-width="6"/>
  <text x="110" y="138" fill="#1c1f23" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Local Setup Checklist</text>
  <text x="110" y="182" fill="#495057" font-family="Arial, Helvetica, sans-serif" font-size="24">설치부터 미리보기까지, 처음 실행할 때 필요한 순서를 그대로 정리한 다이어그램</text>

  <rect x="112" y="236" width="220" height="92" rx="22" fill="#0f172a"/>
  <text x="140" y="292" fill="#51cf66" font-family="SFMono-Regular, Consolas, monospace" font-size="28">$ bundle install</text>

  <rect x="384" y="236" width="240" height="92" rx="22" fill="#0f172a"/>
  <text x="412" y="292" fill="#8ce99a" font-family="SFMono-Regular, Consolas, monospace" font-size="26">$ ruby scripts/</text>
  <text x="412" y="322" fill="#8ce99a" font-family="SFMono-Regular, Consolas, monospace" font-size="26">fetch_github...</text>

  <rect x="676" y="236" width="236" height="92" rx="22" fill="#0f172a"/>
  <text x="702" y="292" fill="#8ce99a" font-family="SFMono-Regular, Consolas, monospace" font-size="26">$ bundle exec</text>
  <text x="702" y="322" fill="#8ce99a" font-family="SFMono-Regular, Consolas, monospace" font-size="26">jekyll serve</text>

  <rect x="964" y="236" width="204" height="92" rx="22" fill="#ffffff" stroke="#12b886" stroke-width="4"/>
  <text x="994" y="287" fill="#087f5b" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Preview</text>
  <text x="994" y="322" fill="#087f5b" font-family="SFMono-Regular, Consolas, monospace" font-size="20">127.0.0.1:4000</text>

  <path d="M332 282h40" stroke="#12b886" stroke-width="8" stroke-linecap="round"/>
  <path d="M624 282h40" stroke="#12b886" stroke-width="8" stroke-linecap="round"/>
  <path d="M912 282h32" stroke="#12b886" stroke-width="8" stroke-linecap="round"/>

  <rect x="112" y="396" width="480" height="196" rx="28" fill="#f8f9fa" stroke="#dee2e6" stroke-width="4"/>
  <text x="144" y="448" fill="#1c1f23" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">필수 확인 항목</text>
  <text x="144" y="496" fill="#495057" font-family="Arial, Helvetica, sans-serif" font-size="24">1. Ruby / Bundler 설치</text>
  <text x="144" y="534" fill="#495057" font-family="Arial, Helvetica, sans-serif" font-size="24">2. 저장소 이름과 baseurl 일치</text>
  <text x="144" y="572" fill="#495057" font-family="Arial, Helvetica, sans-serif" font-size="24">3. GitHub 토큰이 없으면 동기화 단계 생략</text>

  <rect x="650" y="396" width="518" height="196" rx="28" fill="#fff4e6" stroke="#fd7e14" stroke-width="4"/>
  <text x="682" y="448" fill="#7c2d12" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">초기 실행 문제 해결</text>
  <text x="682" y="496" fill="#7c2d12" font-family="Arial, Helvetica, sans-serif" font-size="24">- gem 설치 오류가 나면 BUNDLE_FORCE_RUBY_PLATFORM=true 사용</text>
  <text x="682" y="534" fill="#7c2d12" font-family="Arial, Helvetica, sans-serif" font-size="24">- 잔디가 안 뜨면 gh auth login 또는 GITHUB_TOKEN 확인</text>
  <text x="682" y="572" fill="#7c2d12" font-family="Arial, Helvetica, sans-serif" font-size="24">- 주소가 어긋나면 _config.yml 의 baseurl 확인</text>
</svg>
