<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title>GitHub sync flow</title>
  <desc>Flow from GitHub GraphQL to cache files and theme UI.</desc>
  <rect width="1280" height="720" rx="40" fill="#f8f9fa"/>
  <rect x="72" y="72" width="1136" height="576" rx="32" fill="#ffffff" stroke="#dee2e6" stroke-width="6"/>
  <text x="110" y="138" fill="#1c1f23" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">GitHub Sync Flow</text>
  <text x="110" y="182" fill="#495057" font-family="Arial, Helvetica, sans-serif" font-size="24">공개 GitHub 프로필과 기여 그래프를 받아 캐시 파일로 저장하고 UI에 반영하는 흐름</text>

  <rect x="116" y="248" width="236" height="164" rx="28" fill="#212529"/>
  <text x="156" y="318" fill="#f8f9fa" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">GitHub API</text>
  <text x="156" y="362" fill="#ced4da" font-family="Arial, Helvetica, sans-serif" font-size="24">GraphQL profile</text>
  <text x="156" y="396" fill="#ced4da" font-family="Arial, Helvetica, sans-serif" font-size="24">contribution calendar</text>

  <rect x="424" y="248" width="432" height="164" rx="28" fill="#eef7ff" stroke="#228be6" stroke-width="4"/>
  <text x="456" y="318" fill="#1d4ed8" font-family="SFMono-Regular, Consolas, monospace" font-size="28" font-weight="700">scripts/fetch_github_contributions.rb</text>
  <text x="456" y="360" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="24">토큰 또는 gh auth login 사용</text>
  <text x="456" y="394" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="24">profile + contributions cache 생성</text>

  <rect x="928" y="226" width="176" height="92" rx="22" fill="#ecfdf3" stroke="#12b886" stroke-width="4"/>
  <text x="952" y="280" fill="#087f5b" font-family="SFMono-Regular, Consolas, monospace" font-size="22">github_profile_</text>
  <text x="952" y="306" fill="#087f5b" font-family="SFMono-Regular, Consolas, monospace" font-size="22">cache.json</text>
  <rect x="928" y="344" width="176" height="92" rx="22" fill="#ecfdf3" stroke="#12b886" stroke-width="4"/>
  <text x="952" y="398" fill="#087f5b" font-family="SFMono-Regular, Consolas, monospace" font-size="22">github_contri-</text>
  <text x="952" y="424" fill="#087f5b" font-family="SFMono-Regular, Consolas, monospace" font-size="22">butions_cache.json</text>

  <path d="M352 330h52" stroke="#adb5bd" stroke-width="8" stroke-linecap="round"/>
  <path d="M856 330h48" stroke="#adb5bd" stroke-width="8" stroke-linecap="round"/>
  <path d="M856 374h48" stroke="#adb5bd" stroke-width="8" stroke-linecap="round"/>

  <rect x="274" y="486" width="732" height="104" rx="26" fill="#fff4e6" stroke="#fd7e14" stroke-width="4"/>
  <text x="316" y="548" fill="#7c2d12" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Profile block, header avatar, favicon, contribution graph</text>
</svg>
