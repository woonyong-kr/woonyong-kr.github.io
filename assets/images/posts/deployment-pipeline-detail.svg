<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title>Deployment pipeline guide</title>
  <desc>Deployment pipeline from main branch to GitHub Pages.</desc>
  <rect width="1280" height="720" rx="40" fill="#f3f0ff"/>
  <rect x="72" y="72" width="1136" height="576" rx="32" fill="#ffffff" stroke="#d0bfff" stroke-width="6"/>
  <text x="110" y="138" fill="#1c1f23" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Deployment Pipeline</text>
  <text x="110" y="182" fill="#495057" font-family="Arial, Helvetica, sans-serif" font-size="24">main 브랜치에서 빌드한 정적 결과를 gh-pages로 밀어 GitHub Pages에 반영하는 순서</text>

  <rect x="110" y="260" width="188" height="110" rx="24" fill="#ffffff" stroke="#7950f2" stroke-width="4"/>
  <rect x="358" y="260" width="188" height="110" rx="24" fill="#ffffff" stroke="#7950f2" stroke-width="4"/>
  <rect x="606" y="260" width="188" height="110" rx="24" fill="#ffffff" stroke="#7950f2" stroke-width="4"/>
  <rect x="854" y="260" width="188" height="110" rx="24" fill="#ffffff" stroke="#7950f2" stroke-width="4"/>
  <rect x="1102" y="260" width="106" height="110" rx="24" fill="#ffffff" stroke="#7950f2" stroke-width="4"/>

  <text x="150" y="326" fill="#5f3dc4" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">main</text>
  <text x="386" y="326" fill="#5f3dc4" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Jenkins</text>
  <text x="648" y="326" fill="#5f3dc4" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">_site</text>
  <text x="880" y="326" fill="#5f3dc4" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">gh-pages</text>
  <text x="1122" y="326" fill="#5f3dc4" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Pages</text>

  <path d="M300 315h42" stroke="#7950f2" stroke-width="8" stroke-linecap="round"/>
  <path d="M548 315h42" stroke="#7950f2" stroke-width="8" stroke-linecap="round"/>
  <path d="M796 315h42" stroke="#7950f2" stroke-width="8" stroke-linecap="round"/>
  <path d="M1044 315h34" stroke="#7950f2" stroke-width="8" stroke-linecap="round"/>

  <rect x="142" y="448" width="996" height="132" rx="28" fill="#212529"/>
  <text x="182" y="510" fill="#f8f9fa" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">1. gem 설치 → 2. GitHub 동기화 → 3. jekyll build → 4. gh-pages push</text>
  <text x="182" y="554" fill="#ced4da" font-family="Arial, Helvetica, sans-serif" font-size="24">GitHub Pages 프로젝트 페이지를 쓰는 경우 baseurl은 저장소 이름과 반드시 일치해야 합니다.</text>
</svg>
