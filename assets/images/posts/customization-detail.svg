<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title>Customization map</title>
  <desc>Map of the main configuration files and UI they affect.</desc>
  <rect width="1280" height="720" rx="40" fill="#fff4e6"/>
  <rect x="72" y="72" width="1136" height="576" rx="32" fill="#ffffff" stroke="#ffd8a8" stroke-width="6"/>
  <text x="110" y="138" fill="#1c1f23" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Customization Map</text>
  <text x="110" y="182" fill="#495057" font-family="Arial, Helvetica, sans-serif" font-size="24">브랜딩과 UI 문구를 주로 어디서 바꾸는지 파일 단위로 정리한 설정 지도</text>

  <rect x="112" y="242" width="294" height="220" rx="28" fill="#eef7ff" stroke="#228be6" stroke-width="4"/>
  <text x="142" y="294" fill="#1d4ed8" font-family="SFMono-Regular, Consolas, monospace" font-size="30" font-weight="700">_config.yml</text>
  <text x="142" y="344" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="24">title / description</text>
  <text x="142" y="380" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="24">url / baseurl</text>
  <text x="142" y="416" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="24">analytics / comments / search</text>

  <rect x="492" y="242" width="294" height="220" rx="28" fill="#ecfdf3" stroke="#12b886" stroke-width="4"/>
  <text x="522" y="294" fill="#087f5b" font-family="SFMono-Regular, Consolas, monospace" font-size="30" font-weight="700">_data/theme.yml</text>
  <text x="522" y="344" fill="#087f5b" font-family="Arial, Helvetica, sans-serif" font-size="24">탭 노출</text>
  <text x="522" y="380" fill="#087f5b" font-family="Arial, Helvetica, sans-serif" font-size="24">홈 문구 / 검색 placeholder</text>
  <text x="522" y="416" fill="#087f5b" font-family="Arial, Helvetica, sans-serif" font-size="24">GitHub 동기화 / 헤더 버튼</text>

  <rect x="872" y="242" width="294" height="220" rx="28" fill="#f3f0ff" stroke="#7950f2" stroke-width="4"/>
  <text x="902" y="294" fill="#5f3dc4" font-family="SFMono-Regular, Consolas, monospace" font-size="30" font-weight="700">_data/profile.yml</text>
  <text x="902" y="344" fill="#5f3dc4" font-family="Arial, Helvetica, sans-serif" font-size="24">기본 이름 / 소개 문구</text>
  <text x="902" y="380" fill="#5f3dc4" font-family="Arial, Helvetica, sans-serif" font-size="24">fallback avatar</text>
  <text x="902" y="416" fill="#5f3dc4" font-family="Arial, Helvetica, sans-serif" font-size="24">GitHub 링크 기본값</text>

  <rect x="112" y="512" width="1054" height="92" rx="24" fill="#212529"/>
  <text x="146" y="568" fill="#f8f9fa" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">추천 순서: _config.yml → _data/theme.yml → _data/profile.yml → _data/series.yml → posts</text>
</svg>
